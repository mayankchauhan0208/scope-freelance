<!doctype html><html><head><meta charset="utf-8"><style>*{box-sizing:border-box}body{width:390px;margin:0;background:#f4f1ea;color:#171816;font:13px Arial,sans-serif;padding:18px}h1{font-size:19px;margin:0}.brand{display:flex;align-items:center;gap:8px;margin-bottom:14px}.mark{display:grid;place-items:center;width:29px;height:29px;border-radius:8px;background:#ff6b4a;font-weight:800}.notice{padding:9px;background:#fff4cd;border-radius:8px;font-size:11px;margin:11px 0}.field{padding:9px;background:white;border:1px solid #ddd8cc;border-radius:8px;margin:7px 0}.field b{display:block;font-size:11px}.field small{color:#777}.field textarea{width:100%;margin-top:6px;border:1px solid #ddd8cc;border-radius:6px;padding:7px;font:12px Arial}.review{display:flex;align-items:flex-start;gap:6px;margin-top:7px;font-size:10px;color:#555}.review input{width:auto;margin:1px 0 0}.actions{display:flex;gap:7px;margin-top:11px}button{flex:1;border:0;border-radius:8px;padding:9px;font-weight:700;cursor:pointer}button.primary{background:#171816;color:white}button.secondary{background:white;border:1px solid #ddd8cc}.status{font-size:11px;margin-top:8px;color:#666}</style></head><body><div class="brand"><span class="mark">RD</span><div><h1>RoleDesk Companion</h1><small>User-triggered · reviewed drafts only · never submits</small></div></div><div class="notice">Scanning runs only after you click Scan form. Review and check each answer before filling. Passwords, uploads and submit controls are never touched.</div><div class="actions"><button class="secondary" id="scan">Scan form</button><button class="primary" id="fill" disabled>Fill reviewed drafts</button></div><div id="fields"></div><div class="status" id="status">Open an application form and scan it.</div><script src="popup.js"></script></body></html>
