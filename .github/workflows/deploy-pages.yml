name: Deploy RoleDesk to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Prepare static RoleDesk site
        shell: bash
        run: |
          mkdir -p _site
          cp \
            index.html manifest.webmanifest scope-icon.svg \
            styles.css cloud.css resume-builder.css smart-engine.css portal-center.css email-desk.css tracker-dashboard.css mvp-polish.css coverage-engine.css career-agent.css job-trust.css application-kit.css \
            security-utils.js app.js universal-search.js opportunity-engine.js job-source-engine.js application-kit.js search-intent.js resume-builder.js smart-engine.js source-registry.js coverage-engine.js coverage-ui.js portal-center.js email-desk.js tracker-engine.js career-agent.js career-agent-ui.js \
            supabase.min.js supabase-config.js supabase-sync.js admin-operations.js sw.js \
            pdf.min.js pdf.worker.min.js mammoth.browser.min.js \
            _site/
          touch _site/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
